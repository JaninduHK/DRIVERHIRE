# DRIVERHIRE - in-container nginx (serves SPA + reverse-proxies the API)
# This is HTTP-only by default so the stack works immediately after `docker compose up`.
# To enable HTTPS, see DOCKER_MIGRATION.md (section "Enabling HTTPS").

upstream backend {
    server backend:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 60M;  # 5x 10MB vehicle images + form overhead

    # Let's Encrypt ACME HTTP-01 challenge (used when issuing/renewing certs)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend static files (SPA)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Uploaded images served directly from the shared volume (fast path)
    location /uploads {
        alias /app/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri @backend_uploads;
    }

    # Fallback: if a file isn't on disk yet, let the Node backend serve it
    location @backend_uploads {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API → Node backend
    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_vary on;
}

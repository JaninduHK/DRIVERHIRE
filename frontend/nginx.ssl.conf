# DRIVERHIRE - HTTPS nginx config (use AFTER certificates are issued).
# To activate: in frontend/Dockerfile, copy this file instead of nginx.conf:
#     COPY nginx.ssl.conf /etc/nginx/conf.d/app.conf
# then rebuild the web image.  Replace carwithdriver.lk with your domain.

upstream backend {
    server backend:3000;
}

# HTTP -> redirect to HTTPS (keeps the ACME challenge path open for renewals)
server {
    listen 80;
    listen [::]:80;
    server_name carwithdriver.lk www.carwithdriver.lk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name carwithdriver.lk www.carwithdriver.lk;

    client_max_body_size 60M;

    ssl_certificate     /etc/letsencrypt/live/carwithdriver.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carwithdriver.lk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /uploads {
        alias /app/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri @backend_uploads;
    }

    location @backend_uploads {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_vary on;
}

# Shared-proxy routing for carwithdriver.lk -> DRIVERHIRE web container.
# HTTP-only first, so certbot can issue the certificate. After the cert
# exists, replace this file's contents with carwithdriver.lk.ssl.conf and
# reload:  docker compose exec proxy nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name carwithdriver.lk www.carwithdriver.lk;

    client_max_body_size 60M;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://driverhire-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
